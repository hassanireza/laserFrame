<svg viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg" font-family="Verdana, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b0f"/>
      <stop offset="100%" stop-color="#141022"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff00cc"/>
      <stop offset="100%" stop-color="#00ffe1"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00ffe1"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="260" rx="20" fill="url(#bg2)"/>
  <text x="500" y="38" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold" letter-spacing="1">Visitor Journey — a One-Way Showcase</text>
  <rect x="410" y="50" width="180" height="3" rx="2" fill="url(#accent2)"/>

  <!-- Step 1 -->
  <g>
    <rect x="40" y="95" width="190" height="110" rx="14" fill="#1c1830" stroke="#ff00cc" stroke-opacity="0.6"/>
    <text x="135" y="128" text-anchor="middle" fill="#ff00cc" font-size="13" font-weight="bold">STEP 1</text>
    <text x="135" y="152" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Land on Hero</text>
    <text x="135" y="172" text-anchor="middle" fill="#9ca3af" font-size="10">Animated intro states</text>
    <text x="135" y="186" text-anchor="middle" fill="#9ca3af" font-size="10">the studio's identity</text>
  </g>

  <line x1="230" y1="150" x2="270" y2="150" stroke="#00ffe1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2 -->
  <g>
    <rect x="272" y="95" width="190" height="110" rx="14" fill="#1c1830" stroke="#00ffcc" stroke-opacity="0.6"/>
    <text x="367" y="128" text-anchor="middle" fill="#00ffcc" font-size="13" font-weight="bold">STEP 2</text>
    <text x="367" y="152" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Browse Work</text>
    <text x="367" y="172" text-anchor="middle" fill="#9ca3af" font-size="10">Parallax project gallery</text>
    <text x="367" y="186" text-anchor="middle" fill="#9ca3af" font-size="10">proves creative range</text>
  </g>

  <line x1="462" y1="150" x2="502" y2="150" stroke="#00ffe1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3 -->
  <g>
    <rect x="504" y="95" width="190" height="110" rx="14" fill="#1c1830" stroke="#ff9900" stroke-opacity="0.6"/>
    <text x="599" y="128" text-anchor="middle" fill="#ff9900" font-size="13" font-weight="bold">STEP 3</text>
    <text x="599" y="152" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Review Services</text>
    <text x="599" y="172" text-anchor="middle" fill="#9ca3af" font-size="10">4 offerings + studio</text>
    <text x="599" y="186" text-anchor="middle" fill="#9ca3af" font-size="10">stats build trust</text>
  </g>

  <line x1="694" y1="150" x2="734" y2="150" stroke="#00ffe1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4 -->
  <g>
    <rect x="736" y="95" width="220" height="110" rx="14" fill="#1c1830" stroke="#9900ff" stroke-opacity="0.6"/>
    <text x="846" y="128" text-anchor="middle" fill="#c084fc" font-size="13" font-weight="bold">STEP 4</text>
    <text x="846" y="152" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Send Inquiry</text>
    <text x="846" y="172" text-anchor="middle" fill="#9ca3af" font-size="10">Validated form opens a</text>
    <text x="846" y="186" text-anchor="middle" fill="#9ca3af" font-size="10">pre-filled mailto: draft</text>
  </g>

  <text x="500" y="240" text-anchor="middle" fill="#98989d" font-size="11">No accounts · No dashboards · No shared workspace — purely an outbound marketing funnel</text>
</svg>
